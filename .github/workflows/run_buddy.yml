name: Buddy Works Automation

on:
  workflow_dispatch:
    inputs:
      loops:
        description: 'Number of accounts to create'
        required: true
        default: '1'
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Setup Environment
        run: |
          chmod +x setup_action.sh
          bash setup_action.sh

      - name: Run Buddy Bot
        env:
          PYTHONUNBUFFERED: 1
        run: |
          # Start Xvfb for a virtual display (makes Chrome look "normal" vs headless)
          # Use a common resolution
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          
          # Wait for Xvfb to be ready
          sleep 3
          
          # Run the main script
          # Using Xvfb to provide a display, so we don't need --headless.
          # We pass DISPLAY to sudo so Chromium knows where to draw the screen,
          # and we specifically use $(which python) so sudo uses the setup-python
          # environment rather than the default system python (which lacks selenium).
          sudo env DISPLAY=:99 PYTHONUNBUFFERED=1 $(which python) main.py -v -l ${{ github.event.inputs.loops || '1' }}

      - name: Commit and Push Accounts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if data/accounts.json exists and has changes
          if [ -f "data/accounts.json" ]; then
            git add data/accounts.json
            if ! git diff --staged --quiet; then
              git commit -m "Auto-update accounts [skip ci]"
              git push origin main
            else
              echo "No new accounts created."
            fi
          fi
